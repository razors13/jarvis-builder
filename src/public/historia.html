<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historia Clínica — Jarvis OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      background: rgba(127, 119, 221, 0.1);
      border: 1px solid rgba(127, 119, 221, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .btn-back {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #e0e0e0;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .btn-back:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .header-actions {
      display: flex;
      gap: 10px;
    }
    .btn-primary {
      background: #7F77DD;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary:hover {
      background: #6B63C5;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #e0e0e0;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .patient-name {
      font-size: 28px;
      font-weight: 700;
      color: #7F77DD;
      margin-bottom: 10px;
    }
    .patient-info {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 14px;
      color: #888;
    }
    .patient-info span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .clinical-data {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 15px;
    }
    .card-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7F77DD;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .card-content {
      font-size: 14px;
      color: #e0e0e0;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 5px;
      margin-bottom: 5px;
    }
    .badge-red {
      background: rgba(226, 75, 74, 0.2);
      color: #E24B4A;
      border: 1px solid rgba(226, 75, 74, 0.3);
    }
    .badge-green {
      background: rgba(29, 158, 117, 0.2);
      color: #1D9E75;
      border: 1px solid rgba(29, 158, 117, 0.3);
    }
    .badge-gray {
      background: rgba(200, 196, 186, 0.2);
      color: #C8C4BA;
      border: 1px solid rgba(200, 196, 186, 0.3);
    }
    .badge-purple {
      background: rgba(127, 119, 221, 0.2);
      color: #7F77DD;
      border: 1px solid rgba(127, 119, 221, 0.3);
    }
    .form-container {
      display: none;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(127, 119, 221, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .form-container.visible {
      display: block;
    }
    .form-title {
      font-size: 18px;
      font-weight: 600;
      color: #7F77DD;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .form-input, .form-textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      padding: 10px;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
    }
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: #7F77DD;
    }
    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }
    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .timeline {
      margin-top: 20px;
    }
    .timeline-title {
      font-size: 20px;
      font-weight: 600;
      color: #7F77DD;
      margin-bottom: 20px;
    }
    .evolution-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      transition: all 0.2s;
    }
    .evolution-card:hover {
      border-color: rgba(127, 119, 221, 0.3);
    }
    .evolution-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }
    .evolution-date {
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }
    .evolution-treatment {
      font-size: 18px;
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 10px;
    }
    .evolution-teeth {
      margin-bottom: 15px;
    }
    .evolution-section {
      margin-bottom: 10px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 6px;
    }
    .evolution-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .evolution-section-content {
      font-size: 14px;
      color: #e0e0e0;
    }
    .evolution-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .evolution-cobro {
      font-size: 20px;
      font-weight: 700;
      color: #7F77DD;
    }
    .badge-pago {
      padding: 6px 14px;
      border-radius: 14px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-pagado {
      background: #1D9E75;
      color: #fff;
    }
    .badge-pendiente {
      background: #EF9F27;
      color: #fff;
    }
    .badge-bonificado {
      background: #7F77DD;
      color: #fff;
    }
    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-success {
      background: #1D9E75;
      color: white;
    }
    .btn-success:hover {
      background: #178a65;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 15px;
      opacity: 0.3;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #7F77DD;
      font-size: 16px;
    }
    .message {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 25px;
      background: #7F77DD;
      color: white;
      border-radius: 8px;
      font-weight: 600;
      opacity: 0;
      transform: translateY(-20px);
      transition: all 0.3s;
      z-index: 1000;
    }
    .message.show {
      opacity: 1;
      transform: translateY(0);
    }
    .message.error {
      background: #E24B4A;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-top">
        <button class="btn-back" onclick="goBack()">← Volver</button>
        <div class="header-actions">
          <button class="btn-secondary" onclick="verOdontograma()">🦷 Ver Odontograma</button>
          <button class="btn-primary" onclick="toggleForm()">+ Nueva Evolución</button>
        </div>
      </div>
      <div class="patient-name" id="patientName">Cargando...</div>
      <div class="patient-info" id="patientInfo"></div>
    </div>

    <div class="clinical-data">
      <div class="card">
        <div class="card-title">Alergias</div>
        <div class="card-content" id="alergias">-</div>
      </div>
      <div class="card">
        <div class="card-title">Notas Médicas</div>
        <div class="card-content" id="notasMedicas">-</div>
      </div>
      <div class="card">
        <div class="card-title">Estado</div>
        <div class="card-content" id="estado">-</div>
      </div>
    </div>

    <div class="form-container" id="formContainer">
      <div class="form-title">Nueva Evolución Clínica</div>
      <form id="evolucionForm" onsubmit="submitEvolucion(event)">
        <div class="form-group">
          <label class="form-label">Tratamiento realizado *</label>
          <textarea class="form-textarea" id="tratamiento" required minlength="3" placeholder="Ej: Obturación con resina compuesta"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Dientes tratados</label>
          <input type="text" class="form-input" id="dientesTratados" placeholder="Ej: 11, 21, 22">
        </div>
        <div class="form-group">
          <label class="form-label">Materiales utilizados</label>
          <textarea class="form-textarea" id="materiales" placeholder="Ej: Resina Filtek Z350, Adhesivo Single Bond"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Anestesia</label>
          <input type="text" class="form-input" id="anestesia" placeholder="Ej: Lidocaína 2% con epinefrina">
        </div>
        <div class="form-group">
          <label class="form-label">Notas clínicas</label>
          <textarea class="form-textarea" id="notas" placeholder="Observaciones adicionales..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Cobro (CLP)</label>
          <input type="number" class="form-input" id="cobro" min="0" placeholder="0">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Registrar Evolución</button>
          <button type="button" class="btn-secondary" onclick="toggleForm()">Cancelar</button>
        </div>
      </form>
    </div>

    <div class="timeline">
      <div class="timeline-title">Historial de Evoluciones</div>
      <div id="evolucionesList"></div>
    </div>
  </div>

  <div class="message" id="message"></div>

  <script>
    const API = '/api/v1';
    let pacienteId = null;
    let pacienteData = null;

    // Obtener ID del paciente de la URL
    const urlParams = new URLSearchParams(window.location.search);
    pacienteId = urlParams.get('paciente_id');

    if (!pacienteId) {
      alert('No se especificó ID de paciente');
      window.location.href = 'index.html';
    }

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message show' + (type === 'error' ? ' error' : '');
      setTimeout(() => msg.classList.remove('show'), 3000);
    }

    function goBack() {
      window.location.href = 'index.html';
    }

    function verOdontograma() {
      window.location.href = `odontograma.html?paciente_id=${pacienteId}`;
    }

    function toggleForm() {
      const form = document.getElementById('formContainer');
      form.classList.toggle('visible');
      if (form.classList.contains('visible')) {
        document.getElementById('tratamiento').focus();
      }
    }

    async function loadPatient() {
      try {
        const response = await fetch(`${API}/pacientes/${pacienteId}`);
        if (!response.ok) throw new Error('Error al cargar paciente');
        
        const data = await response.json();
        pacienteData = data;
        
        document.getElementById('patientName').textContent = data.nombre;
        
        const infoHTML = `
          <span>📋 RUT: ${data.rut || '-'}</span>
          <span>📞 ${data.telefono || '-'}</span>
          <span>📧 ${data.email || '-'}</span>
          <span>🏥 ${data.prevision || '-'}</span>
        `;
        document.getElementById('patientInfo').innerHTML = infoHTML;
        
        // Alergias
        const alergiasEl = document.getElementById('alergias');
        if (data.alergias && data.alergias.length > 0) {
          alergiasEl.innerHTML = data.alergias.map(a => 
            `<span class="badge badge-red">${a}</span>`
          ).join('');
        } else {
          alergiasEl.textContent = 'Sin alergias registradas';
        }
        
        // Notas médicas
        document.getElementById('notasMedicas').textContent = data.notas_medicas || 'Sin notas médicas';
        
        // Estado
        const estadoEl = document.getElementById('estado');
        const estadoBadge = data.estado === 'activo' ? 'badge-green' : 'badge-gray';
        estadoEl.innerHTML = `<span class="badge ${estadoBadge}">${data.estado || 'inactivo'}</span>`;
        
      } catch (error) {
        console.error('Error:', error);
        showMessage('Error al cargar datos del paciente', 'error');
      }
    }

    async function loadEvoluciones() {
      try {
        const response = await fetch(`${API}/evoluciones?paciente_id=${pacienteId}`);
        if (!response.ok) throw new Error('Error al cargar evoluciones');
        
        const data = await response.json();
        const evoluciones = data.evoluciones || [];
        
        const listEl = document.getElementById('evolucionesList');
        
        if (evoluciones.length === 0) {
          listEl.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📋</div>
              <p>Sin evoluciones registradas</p>
            </div>
          `;
          return;
        }
        
        listEl.innerHTML = evoluciones.map(ev => {
          const fecha = new Date(ev.fecha_hora);
          const fechaStr = fecha.toLocaleDateString('es-CL', { 
            day: '2-digit', 
            month: 'short', 
            year: 'numeric' 
          }) + ' — ' + fecha.toLocaleTimeString('es-CL', { 
            hour: '2-digit', 
            minute: '2-digit' 
          });
          
          const dientes = ev.dientes_tratados && ev.dientes_tratados.length > 0
            ? ev.dientes_tratados.map(d => `<span class="badge badge-purple">${d}</span>`).join('')
            : '<span style="color: #888;">Sin dientes especificados</span>';
          
          const cobro = ev.cobro ? `$${Number(ev.cobro).toLocaleString('es-CL')}` : 'Sin cobro';
          
          const estadoPago = ev.estado_pago || 'pendiente';
          const badgePago = estadoPago === 'pagado' ? 'badge-pagado' : 
                           estadoPago === 'bonificado' ? 'badge-bonificado' : 'badge-pendiente';
          
          const btnPagar = estadoPago === 'pendiente' 
            ? `<button class="btn-small btn-success" onclick="marcarPagado(${ev.id})">✓ Marcar Pagado</button>`
            : '';
          
          let sections = '';
          if (ev.materiales) {
            sections += `
              <div class="evolution-section">
                <div class="evolution-section-title">Materiales</div>
                <div class="evolution-section-content">${ev.materiales}</div>
              </div>
            `;
          }
          if (ev.anestesia_tipo) {
            sections += `
              <div class="evolution-section">
                <div class="evolution-section-title">Anestesia</div>
                <div class="evolution-section-content">${ev.anestesia_tipo}</div>
              </div>
            `;
          }
          if (ev.notas) {
            sections += `
              <div class="evolution-section">
                <div class="evolution-section-title">Notas Clínicas</div>
                <div class="evolution-section-content">${ev.notas}</div>
              </div>
            `;
          }
          
          return `
            <div class="evolution-card">
              <div class="evolution-header">
                <div>
                  <div class="evolution-date">${fechaStr}</div>
                  <div class="evolution-treatment">${ev.tratamiento}</div>
                </div>
              </div>
              <div class="evolution-teeth">${dientes}</div>
              ${sections}
              <div class="evolution-footer">
                <div class="evolution-cobro">${cobro}</div>
                <div style="display: flex; align-items: center; gap: 10px;">
                  <span class="badge-pago ${badgePago}">${estadoPago}</span>
                  ${btnPagar}
                </div>
              </div>
            </div>
          `;
        }).join('');
        
      } catch (error) {
        console.error('Error:', error);
        showMessage('Error al cargar evoluciones', 'error');
      }
    }

    async function submitEvolucion(event) {
      event.preventDefault();
      
      try {
        const tratamiento = document.getElementById('tratamiento').value.trim();
        const dientesTratadosStr = document.getElementById('dientesTratados').value.trim();
        const materiales = document.getElementById('materiales').value.trim();
        const anestesia = document.getElementById('anestesia').value.trim();
        const notas = document.getElementById('notas').value.trim();
        const cobro = document.getElementById('cobro').value;
        
        // Parsear dientes tratados
        let dientesTratados = [];
        if (dientesTratadosStr) {
          dientesTratados = dientesTratadosStr.split(',').map(d => parseInt(d.trim())).filter(d => !isNaN(d));
        }
        
        const body = {
          paciente_id: parseInt(pacienteId),
          tratamiento,
          dientes_tratados: dientesTratados,
          materiales: materiales || null,
          anestesia_tipo: anestesia || null,
          notas: notas || null,
          cobro: cobro ? parseFloat(cobro) : null
        };
        
        const response = await fetch(`${API}/evoluciones`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Error al crear evolución');
        }
        
        showMessage('✓ Evolución registrada exitosamente');
        document.getElementById('evolucionForm').reset();
        toggleForm();
        loadEvoluciones();
        
      } catch (error) {
        console.error('Error:', error);
        showMessage(error.message, 'error');
      }
    }

    async function marcarPagado(id) {
      try {
        const response = await fetch(`${API}/evoluciones/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ estado_pago: 'pagado' })
        });
        
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Error al actualizar');
        }
        
        showMessage('✓ Marcado como pagado');
        loadEvoluciones();
        
      } catch (error) {
        console.error('Error:', error);
        showMessage(error.message, 'error');
      }
    }

    // Inicializar
    loadPatient();
    loadEvoluciones();
  </script>
</body>
</html>
