<!DOCTYPE html>
<html lang="es">
<head>
  <script src="/theme.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historia Clínica — Jarvis OS</title>
  <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    min-height: 100vh;
    transition: background .2s, color .2s;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  .header {
    background: var(--purple-glow);
    border: 1px solid rgba(127,119,221,0.3);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }
  .btn-back { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
  .btn-back:hover { background: var(--bg4); }
  .header-actions { display: flex; gap: 10px; }
  .btn-primary { background: #7F77DD; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
  .btn-primary:hover { background: #6B63C5; transform: translateY(-1px); }
  .btn-secondary { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
  .btn-secondary:hover { background: var(--bg4); }
  .patient-name { font-size: 28px; font-weight: 700; color: #7F77DD; margin-bottom: 10px; }
  .patient-info { display: flex; gap: 20px; flex-wrap: wrap; font-size: 14px; color: var(--text-dim); }
  .patient-info span { display: flex; align-items: center; gap: 5px; }
  .clinical-data { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-bottom: 20px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 15px; }
  .card-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #7F77DD; margin-bottom: 10px; font-weight: 600; }
  .card-content { font-size: 14px; color: var(--text); }
  .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-right: 5px; margin-bottom: 5px; }
  .badge-red { background: rgba(226,75,74,0.2); color: #E24B4A; border: 1px solid rgba(226,75,74,0.3); }
  .badge-green { background: rgba(29,158,117,0.2); color: #1D9E75; border: 1px solid rgba(29,158,117,0.3); }
  .badge-gray { background: rgba(200,196,186,0.2); color: #888; border: 1px solid var(--border); }
  .badge-purple { background: rgba(127,119,221,0.2); color: #7F77DD; border: 1px solid rgba(127,119,221,0.3); }
  .form-container { display: none; background: var(--bg2); border: 1px solid rgba(127,119,221,0.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .form-container.visible { display: block; }
  .form-title { font-size: 18px; font-weight: 600; color: #7F77DD; margin-bottom: 20px; }
  .form-group { margin-bottom: 15px; }
  .form-label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 5px; font-weight: 600; }
  .form-input, .form-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: var(--text); font-size: 14px; font-family: inherit; transition: border-color .2s; }
  .form-input:focus, .form-textarea:focus { outline: none; border-color: #7F77DD; }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-actions { display: flex; gap: 10px; margin-top: 20px; }
  .timeline { margin-top: 20px; }
  .timeline-title { font-size: 20px; font-weight: 600; color: #7F77DD; margin-bottom: 20px; }
  .evolution-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; transition: all 0.2s; }
  .evolution-card:hover { border-color: rgba(127,119,221,0.3); }
  .evolution-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
  .evolution-date { font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
  .evolution-treatment { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
  .evolution-teeth { margin-bottom: 15px; }
  .evolution-section { margin-bottom: 10px; padding: 10px; background: var(--bg3); border-radius: 6px; }
  .evolution-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 5px; font-weight: 600; }
  .evolution-section-content { font-size: 14px; color: var(--text); }
  .evolution-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
  .evolution-cobro { font-size: 20px; font-weight: 700; color: #7F77DD; }
  .badge-pago { padding: 6px 14px; border-radius: 14px; font-size: 12px; font-weight: 600; }
  .badge-pagado { background: #1D9E75; color: #fff; }
  .badge-pendiente { background: #EF9F27; color: #fff; }
  .badge-bonificado { background: #7F77DD; color: #fff; }
  .btn-small { padding: 6px 12px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; transition: all 0.2s; }
  .btn-success { background: #1D9E75; color: white; }
  .btn-success:hover { background: #178a65; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-state-icon { font-size: 48px; margin-bottom: 15px; opacity: 0.3; }
  .message { position: fixed; top: 20px; right: 20px; padding: 15px 25px; background: #7F77DD; color: white; border-radius: 8px; font-weight: 600; opacity: 0; transform: translateY(-20px); transition: all 0.3s; z-index: 1000; }
  .message.show { opacity: 1; transform: translateY(0); }
  .message.error { background: #E24B4A; }
  .fin-card { background: var(--bg2); border: 1px solid rgba(127,119,221,0.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .fin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .fin-title { font-size: 14px; font-weight: 700; color: #7F77DD; text-transform: uppercase; letter-spacing: 1px; }
  .fin-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .fin-metric { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .fin-metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 6px; }
  .fin-metric-value { font-size: 20px; font-weight: 700; color: var(--text); }
  .fin-metric-value.purple { color: #7F77DD; }
  .fin-metric-value.green { color: #4ade80; }
  .fin-metric-value.yellow { color: #fbbf24; }
  .fin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .fin-table th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); padding: 6px 10px; border-bottom: 1px solid var(--border); }
  .fin-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
  .fin-table tr:last-child td { border-bottom: none; }
  .fin-table tr:hover td { background: var(--bg3); }
  .btn-print { background: transparent; border: 1px solid rgba(127,119,221,0.5); color: #7F77DD; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-weight: 600; }
  .btn-print:hover { background: rgba(127,119,221,0.1); }
  @media print {
    body * { visibility: hidden; }
    #resumen-financiero, #resumen-financiero * { visibility: visible; }
    #resumen-financiero { position: fixed; inset: 0; padding: 32px; background: #fff; color: #000; }
    .btn-print { display: none; }
    .fin-metric { border: 1px solid #ccc; background: #f9f9f9; }
    .fin-metric-label { color: #555; }
    .fin-metric-value, .fin-metric-value.purple, .fin-metric-value.green, .fin-metric-value.yellow { color: #000; }
    .fin-table th { color: #555; }
    .fin-table td { color: #000; }
  }
  /* ── JARVIS CHAT FLOTANTE ── */
  @keyframes jarvis-pulse {
    0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}
    50%{box-shadow:0 0 0 8px rgba(248,113,113,0)}
  }
  .jarvis-mic-active {
    background:rgba(248,113,113,.3) !important;
    color:#f87171 !important;
    animation:jarvis-pulse 1s infinite !important;
  }
  .jarvis-msg-user {
    align-self:flex-end;
    background:#4e4899;
    color:#fff;
    padding:8px 12px;
    border-radius:12px 12px 3px 12px;
    font-size:12px;
    font-family:'Courier New',monospace;
    max-width:85%;
    line-height:1.5;
    word-break:break-word;
  }
  .jarvis-msg-jarvis {
    align-self:flex-start;
    background:#1a1a1a;
    color:#e0e0e0;
    padding:8px 12px;
    border-radius:12px 12px 12px 3px;
    font-size:12px;
    font-family:'Courier New',monospace;
    max-width:85%;
    line-height:1.5;
    word-break:break-word;
    border:1px solid #2a2a2a;
  }
  .jarvis-msg-jarvis.accion-ok {
    border-color:rgba(74,222,128,.4);
    background:#0d1a0d;
  }
  .jarvis-typing {
    display:flex;gap:4px;align-items:center;
    padding:10px 12px;
  }
  .jarvis-typing span {
    width:6px;height:6px;border-radius:50%;
    background:#7F77DD;animation:jarvis-dot 1.2s infinite;
  }
  .jarvis-typing span:nth-child(2){animation-delay:.2s}
  .jarvis-typing span:nth-child(3){animation-delay:.4s}
  @keyframes jarvis-dot {
    0%,60%,100%{transform:translateY(0);opacity:.4}
    30%{transform:translateY(-5px);opacity:1}
  }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-top">
        <button class="btn-back" onclick="goBack()">← Volver</button>
        <div class="header-actions">
          <button onclick="toggleTheme()" id="theme-toggle" style="background:transparent;border:1px solid rgba(255,255,255,.12);border-radius:6px;color:var(--text);font-size:14px;padding:4px 10px;cursor:pointer">☀️</button>
          <button class="btn-secondary" onclick="verOdontograma()">🦷 Ver Odontograma</button>
          <button id="btn-derivar" onclick="abrirModalDerivar()" style="padding:7px 16px;border-radius:8px;border:1px solid rgba(56,189,248,.4);background:transparent;color:#38bdf8;font-size:13px;cursor:pointer">Derivar Paciente</button>
          <button class="btn-primary" onclick="toggleForm()">+ Nueva Evolución</button>
          <button onclick="logout()" style="background:transparent;border:1px solid rgba(248,113,113,.3);border-radius:6px;color:#f87171;font-size:12px;padding:5px 12px;cursor:pointer">Salir</button>
        </div>
      </div>
      <div class="patient-name" id="patientName">Cargando...</div>
      <div class="patient-info" id="patientInfo"></div>
    </div>

    <div class="clinical-data">
      <div class="card"><div class="card-title">Alergias</div><div class="card-content" id="alergias">-</div></div>
      <div class="card"><div class="card-title">Notas Médicas</div><div class="card-content" id="notasMedicas">-</div></div>
      <div class="card"><div class="card-title">Estado</div><div class="card-content" id="estado">-</div></div>
    </div>

    <div class="fin-card" id="resumen-financiero" style="display:none">
      <div class="fin-header">
        <div class="fin-title">💰 Resumen Financiero</div>
        <button class="btn-print" onclick="window.print()">🖨 Imprimir</button>
      </div>
      <div class="fin-metrics">
        <div class="fin-metric"><div class="fin-metric-label">Total cobrado</div><div class="fin-metric-value purple" id="fin-total">$0</div></div>
        <div class="fin-metric"><div class="fin-metric-label">Total pagado</div><div class="fin-metric-value green" id="fin-pagado">$0</div></div>
        <div class="fin-metric"><div class="fin-metric-label">Pendiente</div><div class="fin-metric-value yellow" id="fin-pendiente">$0</div></div>
        <div class="fin-metric"><div class="fin-metric-label">Sesiones</div><div class="fin-metric-value" id="fin-sesiones">0</div></div>
        <div class="fin-metric"><div class="fin-metric-label">Promedio por sesión</div><div class="fin-metric-value purple" id="fin-promedio">$0</div></div>
      </div>
      <table class="fin-table">
        <thead><tr><th>Fecha</th><th>Tratamiento</th><th>Cobro</th><th>Estado</th></tr></thead>
        <tbody id="fin-tbody"></tbody>
      </table>
    </div>

    <div class="form-container" id="formContainer">
      <div class="form-title">Nueva Evolución Clínica</div>
      <form id="evolucionForm" onsubmit="submitEvolucion(event)">
        <div class="form-group"><label class="form-label">Tratamiento realizado *</label><textarea class="form-textarea" id="tratamiento" required minlength="3" placeholder="Ej: Obturación con resina compuesta"></textarea></div>
        <div class="form-group"><label class="form-label">Dientes tratados</label><input type="text" class="form-input" id="dientesTratados" placeholder="Ej: 11, 21, 22"></div>
        <div class="form-group"><label class="form-label">Materiales utilizados</label><textarea class="form-textarea" id="materiales" placeholder="Ej: Resina Filtek Z350, Adhesivo Single Bond"></textarea></div>
        <div class="form-group"><label class="form-label">Anestesia</label><input type="text" class="form-input" id="anestesia" placeholder="Ej: Lidocaína 2% con epinefrina"></div>
        <div class="form-group"><label class="form-label">Notas clínicas</label><textarea class="form-textarea" id="notas" placeholder="Observaciones adicionales..."></textarea></div>
        <div class="form-group"><label class="form-label">Cobro (CLP)</label><input type="number" class="form-input" id="cobro" min="0" placeholder="0"></div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Registrar Evolución</button>
          <button type="button" class="btn-secondary" onclick="toggleForm()">Cancelar</button>
        </div>
      </form>
    </div>

    <div class="timeline">
      <div class="timeline-title">Historial de Evoluciones</div>
      <div id="evolucionesList"></div>
    </div>
  </div>

  <div class="message" id="message"></div>

  <!-- Modal Derivación -->
  <div id="modal-derivar" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center">
    <div style="background:var(--bg2,#1a1a1a);border:1px solid rgba(56,189,248,.3);border-radius:14px;padding:24px;width:440px;max-width:95vw">
      <h2 style="font-size:16px;color:#38bdf8;margin-bottom:16px">Derivar Paciente</h2>
      <div style="margin-bottom:12px">
        <label style="font-size:11px;color:#888;display:block;margin-bottom:4px;text-transform:uppercase">Doctor destino</label>
        <select id="drv-doctor" style="width:100%;padding:8px 12px;background:var(--bg3,#1a1a1a);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text,#e0e0e0);font-size:13px;outline:none">
          <option value="">Seleccionar doctor...</option>
        </select>
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:11px;color:#888;display:block;margin-bottom:4px;text-transform:uppercase">Motivo de derivación *</label>
        <input id="drv-motivo" type="text" placeholder="Ej: Endodoncia pieza 36..." style="width:100%;padding:8px 12px;background:var(--bg3,#1a1a1a);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text,#e0e0e0);font-size:13px;outline:none">
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:11px;color:#888;display:block;margin-bottom:4px;text-transform:uppercase">Notas adicionales</label>
        <textarea id="drv-notas" rows="3" placeholder="Observaciones clínicas relevantes..." style="width:100%;padding:8px 12px;background:var(--bg3,#1a1a1a);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text,#e0e0e0);font-size:13px;outline:none;resize:vertical;font-family:inherit"></textarea>
      </div>
      <div style="margin-bottom:20px;display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="drv-acceso" checked style="width:16px;height:16px;cursor:pointer">
        <label for="drv-acceso" style="font-size:12px;color:#aaa;cursor:pointer">Compartir historia clínica completa</label>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button onclick="cerrarModalDerivar()" style="padding:8px 18px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#e0e0e0;font-size:13px;cursor:pointer">Cancelar</button>
        <button onclick="enviarDerivacion()" style="padding:8px 18px;border-radius:8px;border:none;background:#38bdf8;color:#000;font-size:13px;font-weight:600;cursor:pointer">Enviar Derivación</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- JARVIS CHAT FLOTANTE CON VOZ                           -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Botón flotante -->
  <button id="jarvis-fab" onclick="toggleChat()" style="
    position:fixed;bottom:24px;right:24px;z-index:500;
    background:#7F77DD;color:#fff;border:none;
    border-radius:50px;padding:12px 20px;
    font-size:14px;font-weight:700;cursor:pointer;
    box-shadow:0 4px 20px rgba(127,119,221,0.5);
    display:flex;align-items:center;gap:8px;
    transition:all .2s;letter-spacing:1px">
    ⬡ JARVIS
  </button>

  <!-- Panel de chat -->
  <div id="jarvis-panel" style="
    display:none;position:fixed;bottom:80px;right:24px;
    width:360px;height:480px;z-index:500;
    background:#1a1a2e;border:1px solid rgba(127,119,221,.3);
    border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.6);
    flex-direction:column;overflow:hidden">

    <!-- Header -->
    <div style="
      padding:12px 16px;background:rgba(127,119,221,.15);
      border-bottom:1px solid rgba(127,119,221,.2);
      display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="color:#7F77DD;font-size:16px">⬡</span>
        <span style="color:#e0e0e0;font-size:13px;font-weight:700;letter-spacing:1px">JARVIS</span>
        <span style="width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;display:inline-block"></span>
      </div>
      <button onclick="toggleChat()" style="
        background:transparent;border:none;color:#888;
        font-size:18px;cursor:pointer;line-height:1">×</button>
    </div>

    <!-- Mensajes -->
    <div id="jarvis-messages" style="
      flex:1;overflow-y:auto;padding:12px;
      display:flex;flex-direction:column;gap:10px;
      scroll-behavior:smooth">
      <div id="jarvis-welcome" style="
        text-align:center;padding:20px 10px;
        color:#555;font-size:12px;font-family:'Courier New',monospace">
        <div style="font-size:28px;margin-bottom:8px;opacity:.4">⬡</div>
        Listo para registrar
      </div>
    </div>

    <!-- Input área -->
    <div style="
      padding:10px 12px;border-top:1px solid rgba(127,119,221,.2);
      background:rgba(0,0,0,.3);display:flex;gap:8px;align-items:flex-end">
      <textarea id="jarvis-input" placeholder="Dictá o escribí..." rows="1" style="
        flex:1;background:#0d0d1a;border:1px solid rgba(127,119,221,.2);
        border-radius:8px;padding:8px 10px;color:#e0e0e0;
        font-size:12px;font-family:'Courier New',monospace;
        resize:none;outline:none;min-height:36px;max-height:80px;
        line-height:1.4;transition:border-color .2s"></textarea>
      <button id="jarvis-mic" onclick="toggleVoz()" style="
        width:36px;height:36px;border-radius:50%;border:none;
        background:rgba(127,119,221,.2);color:#7F77DD;
        font-size:16px;cursor:pointer;flex-shrink:0;
        transition:all .2s;display:flex;align-items:center;justify-content:center">
        🎤
      </button>
      <button onclick="enviarMensajeChat()" style="
        width:36px;height:36px;border-radius:50%;border:none;
        background:#7F77DD;color:#fff;font-size:14px;
        cursor:pointer;flex-shrink:0;
        display:flex;align-items:center;justify-content:center">
        ➤
      </button>
    </div>
  </div>

  <!-- Overlay para cerrar al click fuera -->
  <div id="jarvis-overlay" onclick="toggleChat()" style="
    display:none;position:fixed;inset:0;z-index:499;
    background:transparent"></div>

  <script>
    var TOKEN = localStorage.getItem('jarvis_token') || '';
    var API = '/api/v1';
    var pacienteId = null;
    var pacienteData = null;
    window._esDoctorDerivado = false;

    function apiFetch(url, options) {
      options = options || {};
      options.headers = options.headers || {};
      options.headers['Authorization'] = 'Bearer ' + TOKEN;
      return fetch(url, options);
    }

    function logout(){
      localStorage.removeItem('jarvis_token');
      localStorage.removeItem('jarvis_user');
      window.location.href = '/login.html';
    }

    (async function checkAuth(){
      if(!TOKEN){ window.location.href='/login.html'; return; }
      try{
        var r = await apiFetch('/api/v1/auth/verify');
        if(!r.ok){ localStorage.removeItem('jarvis_token'); window.location.href='/login.html'; }
      }catch(e){ window.location.href='/login.html'; }
    })();

    var urlParams = new URLSearchParams(window.location.search);
    pacienteId = urlParams.get('paciente_id');
    if (!pacienteId) { alert('No se especificó ID de paciente'); window.location.href = 'index.html'; }

    function showMessage(text, type) {
      type = type || 'success';
      var msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message show' + (type==='error' ? ' error' : '');
      setTimeout(function(){ msg.classList.remove('show'); }, 3000);
    }

    function goBack() { window.history.back(); }
    function verOdontograma() { window.location.href = 'odontograma.html?paciente_id=' + pacienteId; }

    function toggleForm() {
      var form = document.getElementById('formContainer');
      form.classList.toggle('visible');
      if (form.classList.contains('visible')) document.getElementById('tratamiento').focus();
    }

    async function loadPatient() {
      try {
        var response = await apiFetch(API + '/pacientes/' + pacienteId);
        if (!response.ok) throw new Error('Error al cargar paciente');
        var data = await response.json();
        pacienteData = data;

        var tokenData = JSON.parse(atob(TOKEN.split('.')[1]));
        var userId = tokenData.id;
        var userRole = tokenData.role;
        window._esDoctorDerivado = (userRole === 'doctor' && data.doctor_id && data.doctor_id !== userId);

        document.getElementById('patientName').textContent = data.nombre;
        document.getElementById('patientInfo').innerHTML =
          '<span>📋 RUT: ' + (data.rut||'-') + '</span>' +
          '<span>📞 ' + (data.telefono||'-') + '</span>' +
          '<span>📧 ' + (data.email||'-') + '</span>' +
          '<span>🏥 ' + (data.prevision||'-') + '</span>';

        var alergiasEl = document.getElementById('alergias');
        if (data.alergias && data.alergias.length > 0) {
          alergiasEl.innerHTML = data.alergias.map(function(a){ return '<span class="badge badge-red">'+a+'</span>'; }).join('');
        } else {
          alergiasEl.textContent = 'Sin alergias registradas';
        }
        document.getElementById('notasMedicas').textContent = data.notas_medicas || 'Sin notas médicas';
        document.getElementById('estado').innerHTML = '<span class="badge ' + (data.estado==='activo'?'badge-green':'badge-gray') + '">' + (data.estado||'inactivo') + '</span>';

      } catch (error) {
        console.error('Error:', error);
        showMessage('Error al cargar datos del paciente', 'error');
      }
    }

    function renderResumenFinanciero(evoluciones) {
      if (window._esDoctorDerivado) return;
      var conCobro = evoluciones.filter(function(ev){ return ev.cobro && ev.cobro > 0; });
      if (conCobro.length === 0) return;
      var total = conCobro.reduce(function(s,ev){ return s + Number(ev.cobro); }, 0);
      var pagado = conCobro.filter(function(ev){ return ev.estado_pago === 'pagado'; }).reduce(function(s,ev){ return s + Number(ev.cobro); }, 0);
      var pendiente = total - pagado;
      var promedio = conCobro.length > 0 ? Math.round(total / conCobro.length) : 0;
      document.getElementById('fin-total').textContent = '$' + total.toLocaleString('es-CL');
      document.getElementById('fin-pagado').textContent = '$' + pagado.toLocaleString('es-CL');
      document.getElementById('fin-pendiente').textContent = '$' + pendiente.toLocaleString('es-CL');
      document.getElementById('fin-sesiones').textContent = evoluciones.length;
      document.getElementById('fin-promedio').textContent = '$' + promedio.toLocaleString('es-CL');
      var tbody = document.getElementById('fin-tbody');
      tbody.innerHTML = evoluciones.map(function(ev){
        var fecha = new Date(ev.fecha_hora).toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'});
        var cobro = ev.cobro ? '$' + Number(ev.cobro).toLocaleString('es-CL') : '—';
        var estado = ev.estado_pago || 'pendiente';
        var color = estado==='pagado' ? '#4ade80' : estado==='bonificado' ? '#7F77DD' : '#fbbf24';
        return '<tr><td style="color:var(--text-dim);font-size:12px">'+fecha+'</td><td>'+ev.tratamiento+'</td><td style="font-weight:600">'+cobro+'</td><td><span style="color:'+color+';font-weight:600;font-size:12px">'+estado+'</span></td></tr>';
      }).join('');
      document.getElementById('resumen-financiero').style.display = 'block';
    }

    async function loadEvoluciones() {
      try {
        var response = await apiFetch(API + '/evoluciones?paciente_id=' + pacienteId);
        if (!response.ok) throw new Error('Error al cargar evoluciones');
        var data = await response.json();
        var evoluciones = data.evoluciones || [];
        renderResumenFinanciero(evoluciones);
        var listEl = document.getElementById('evolucionesList');
        if (evoluciones.length === 0) {
          listEl.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><p>Sin evoluciones registradas</p></div>';
          return;
        }
        listEl.innerHTML = evoluciones.map(function(ev){
          var fecha = new Date(ev.fecha_hora);
          var fechaStr = fecha.toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'}) + ' — ' + fecha.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
          var dientes = ev.dientes_tratados && ev.dientes_tratados.length > 0
            ? ev.dientes_tratados.map(function(d){ return '<span class="badge badge-purple">'+d+'</span>'; }).join('')
            : '<span style="color:#888">Sin dientes especificados</span>';
          var cobro = ev.cobro ? '$' + Number(ev.cobro).toLocaleString('es-CL') : 'Sin cobro';
          var estadoPago = ev.estado_pago || 'pendiente';
          var badgePago = estadoPago==='pagado' ? 'badge-pagado' : estadoPago==='bonificado' ? 'badge-bonificado' : 'badge-pendiente';
          var btnPagar = estadoPago==='pendiente' ? '<button class="btn-small btn-success" onclick="marcarPagado('+ev.id+')">✓ Marcar Pagado</button>' : '';
          var sections = '';
          if (ev.materiales) sections += '<div class="evolution-section"><div class="evolution-section-title">Materiales</div><div class="evolution-section-content">'+ev.materiales+'</div></div>';
          if (ev.anestesia_tipo) sections += '<div class="evolution-section"><div class="evolution-section-title">Anestesia</div><div class="evolution-section-content">'+ev.anestesia_tipo+'</div></div>';
          if (ev.notas) sections += '<div class="evolution-section"><div class="evolution-section-title">Notas Clínicas</div><div class="evolution-section-content">'+ev.notas+'</div></div>';
          var footer = window._esDoctorDerivado ? '' :
            '<div class="evolution-footer">' +
              '<div class="evolution-cobro">'+cobro+'</div>' +
              '<div style="display:flex;align-items:center;gap:10px">' +
                '<span class="badge-pago '+badgePago+'">'+estadoPago+'</span>' +
                btnPagar +
              '</div>' +
            '</div>';
          return '<div class="evolution-card">' +
            '<div class="evolution-header"><div>' +
              '<div class="evolution-date">'+fechaStr+'</div>' +
              '<div class="evolution-treatment">'+ev.tratamiento+'</div>' +
            '</div></div>' +
            '<div class="evolution-teeth">'+dientes+'</div>' +
            sections + footer +
          '</div>';
        }).join('');
      } catch (error) {
        console.error('Error:', error);
        showMessage('Error al cargar evoluciones', 'error');
      }
    }

    async function submitEvolucion(event) {
      event.preventDefault();
      try {
        var tratamiento = document.getElementById('tratamiento').value.trim();
        var dientesTratadosStr = document.getElementById('dientesTratados').value.trim();
        var materiales = document.getElementById('materiales').value.trim();
        var anestesia = document.getElementById('anestesia').value.trim();
        var notas = document.getElementById('notas').value.trim();
        var cobro = document.getElementById('cobro').value;
        var dientesTratados = [];
        if (dientesTratadosStr) dientesTratados = dientesTratadosStr.split(',').map(function(d){ return parseInt(d.trim()); }).filter(function(d){ return !isNaN(d); });
        var body = { paciente_id: parseInt(pacienteId), tratamiento: tratamiento, dientes_tratados: dientesTratados, materiales: materiales||null, anestesia_tipo: anestesia||null, notas: notas||null, cobro: cobro ? parseFloat(cobro) : null };
        var response = await apiFetch(API + '/evoluciones', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        if (!response.ok) { var err = await response.json(); throw new Error(err.error||'Error al crear evolución'); }
        showMessage('✓ Evolución registrada exitosamente');
        document.getElementById('evolucionForm').reset();
        toggleForm();
        loadEvoluciones();
      } catch (error) {
        console.error('Error:', error);
        showMessage(error.message, 'error');
      }
    }

    async function marcarPagado(id) {
      try {
        var response = await apiFetch(API + '/evoluciones/' + id, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({estado_pago:'pagado'}) });
        if (!response.ok) { var err = await response.json(); throw new Error(err.error||'Error al actualizar'); }
        showMessage('✓ Marcado como pagado');
        loadEvoluciones();
      } catch (error) {
        console.error('Error:', error);
        showMessage(error.message, 'error');
      }
    }

    async function abrirModalDerivar(){
      var sel = document.getElementById('drv-doctor');
      sel.innerHTML = '<option value="">Seleccionar doctor...</option>';
      try{
        var r = await apiFetch('/api/v1/auth/doctores');
        var d = await r.json();
        (d.doctores||[]).forEach(function(doc){
          var o = document.createElement('option');
          o.value = doc.id;
          o.textContent = doc.nombre_completo + ' (' + doc.role + ')';
          sel.appendChild(o);
        });
      }catch(e){ console.error(e); }
      document.getElementById('modal-derivar').style.display='flex';
    }

    function cerrarModalDerivar(){
      document.getElementById('modal-derivar').style.display='none';
      document.getElementById('drv-motivo').value='';
      document.getElementById('drv-notas').value='';
    }

    async function enviarDerivacion(){
      var doctorId = document.getElementById('drv-doctor').value;
      var motivo = document.getElementById('drv-motivo').value.trim();
      var notas = document.getElementById('drv-notas').value.trim();
      var acceso = document.getElementById('drv-acceso').checked;
      if(!doctorId){ alert('Selecciona un doctor'); return; }
      if(!motivo){ alert('El motivo es requerido'); return; }
      try{
        var r = await apiFetch('/api/v1/derivaciones',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ paciente_id: parseInt(pacienteId), doctor_destino_id: parseInt(doctorId), motivo: motivo, notas: notas||null, acceso_historia: acceso })
        });
        var d = await r.json();
        if(!r.ok){ alert(d.error||'Error al derivar'); return; }
        cerrarModalDerivar();
        showMessage('Derivación enviada exitosamente', 'success');
      }catch(e){ alert('Error de conexion'); }
    }

    // ── JARVIS CHAT FLOTANTE ─────────────────────────────────
    (function(){
      var chatPacienteId = new URLSearchParams(window.location.search).get('paciente_id');
      var chatSessionId = 'historia_' + chatPacienteId + '_' + Date.now();
      var chatAbierto = false;
      var escuchando = false;
      var recognition = null;
      var textoInterim = '';

      window.toggleChat = function() {
        chatAbierto = !chatAbierto;
        var panel = document.getElementById('jarvis-panel');
        var overlay = document.getElementById('jarvis-overlay');
        var fab = document.getElementById('jarvis-fab');
        if (chatAbierto) {
          panel.style.display = 'flex';
          overlay.style.display = 'block';
          fab.style.background = '#4e4899';
          document.getElementById('jarvis-input').focus();
        } else {
          panel.style.display = 'none';
          overlay.style.display = 'none';
          fab.style.background = '#7F77DD';
          if (escuchando) detenerVoz();
        }
      };

      function agregarMensaje(texto, tipo, accionOk) {
        var welcome = document.getElementById('jarvis-welcome');
        if (welcome) welcome.style.display = 'none';
        var msgs = document.getElementById('jarvis-messages');
        var div = document.createElement('div');
        div.className = tipo === 'user' ? 'jarvis-msg-user' : 'jarvis-msg-jarvis';
        if (accionOk) div.classList.add('accion-ok');
        var html = texto
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
          .replace(/\n/g,'<br>');
        div.innerHTML = html;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        return div;
      }

      function mostrarTyping() {
        var msgs = document.getElementById('jarvis-messages');
        var div = document.createElement('div');
        div.className = 'jarvis-msg-jarvis jarvis-typing';
        div.id = 'jarvis-typing';
        div.innerHTML = '<span></span><span></span><span></span>';
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
      }

      function quitarTyping() {
        var t = document.getElementById('jarvis-typing');
        if (t) t.remove();
      }

      window.enviarMensajeChat = async function(textoParam) {
        var input = document.getElementById('jarvis-input');
        var texto = textoParam || input.value.trim();
        if (!texto) return;
        input.value = '';
        input.style.height = 'auto';
        agregarMensaje(texto, 'user', false);
        mostrarTyping();
        try {
          var r = await apiFetch('/api/v1/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              mensaje: texto,
              session_id: chatSessionId,
              paciente_id: parseInt(chatPacienteId)
            })
          });
          var d = await r.json();
          quitarTyping();
          if (!r.ok) {
            agregarMensaje('Error: ' + (d.error||'sin respuesta'), 'jarvis', false);
            return;
          }
          agregarMensaje(d.respuesta, 'jarvis', d.accion_ejecutada);
          if (d.accion_ejecutada) {
            setTimeout(function() {
              if (typeof loadEvoluciones === 'function') loadEvoluciones();
              if (typeof loadPatient === 'function') loadPatient();
            }, 800);
          }
        } catch(e) {
          quitarTyping();
          agregarMensaje('Error de conexión con Jarvis.', 'jarvis', false);
        }
      };

      window.toggleVoz = function() {
        if (escuchando) { detenerVoz(); } else { iniciarVoz(); }
      };

      function iniciarVoz() {
        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          alert('Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.');
          return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = 'es-CL';
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        var input = document.getElementById('jarvis-input');
        var mic = document.getElementById('jarvis-mic');
        recognition.onstart = function() {
          escuchando = true;
          mic.classList.add('jarvis-mic-active');
          mic.textContent = '⏹';
          input.placeholder = 'Escuchando...';
          textoInterim = '';
        };
        recognition.onresult = function(event) {
  var transcript = '';
  for (var i = event.resultIndex; i < event.results.length; i++) {
    transcript += event.results[i][0].transcript;
  }

  var comandoFin = /\b(listo|fin|enviar|termina|terminado|lista evolucion|lista la evolucion)\s*$/i.test(transcript);

  if (comandoFin) {
    textoInterim = transcript
      .replace(/\b(listo|fin|enviar|termina|terminado|lista evolucion|lista la evolucion)\s*$/i, '')
      .trim();
    input.value = textoInterim;
    detenerVoz();
    if (textoInterim.length > 2) {
      setTimeout(function(){ enviarMensajeChat(textoInterim); }, 300);
    }
  } else {
    textoInterim = transcript;
    input.value = transcript;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 80) + 'px';
  }
};
        recognition.onerror = function(e) {
          console.error('Speech error:', e.error);
          detenerVoz();
          if (e.error !== 'aborted') {
            agregarMensaje('No pude escucharte. Intenta de nuevo.', 'jarvis', false);
          }
        };
        recognition.onend = function() {
  // Con continuous=true solo detiene si el usuario hizo click en ⏹
  if (escuchando) {
    // Reiniciar automáticamente si se cortó solo
    try { recognition.start(); } catch(e) {}
  } else {
    if (textoInterim && textoInterim.trim().length > 2) {
      setTimeout(function() {
        enviarMensajeChat(textoInterim.trim());
      }, 300);
    }
  }
};
        recognition.start();
      }

      function detenerVoz() {
        escuchando = false;
        var mic = document.getElementById('jarvis-mic');
        var input = document.getElementById('jarvis-input');
        if (mic) { mic.classList.remove('jarvis-mic-active'); mic.textContent = '🎤'; }
        if (input) input.placeholder = 'Dictá o escribí...';
        if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
      }

      // Enter para enviar
      document.addEventListener('DOMContentLoaded', function() {
        var input = document.getElementById('jarvis-input');
        if (input) {
          input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensajeChat(); }
          });
          input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 80) + 'px';
          });
        }
      });

    })();

    // Cargar en orden correcto
    loadPatient().then(function(){ loadEvoluciones(); });
  </script>
</body>
