<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS OS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0a;
      --bg2:         #111111;
      --bg3:         #1a1a1a;
      --bg4:         #222222;
      --border:      #2a2a2a;
      --purple:      #7F77DD;
      --purple-dim:  #4e4899;
      --purple-glow: rgba(127,119,221,0.15);
      --text:        #e0e0e0;
      --text-dim:    #888888;
      --green:       #4ade80;
      --red:         #f87171;
      --yellow:      #fbbf24;
      --mono:        'Courier New', Courier, monospace;
      --sans:        -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; }

    .app { display: grid; grid-template-rows: 52px 1fr 36px; height: 100vh; overflow: hidden; }

    /* HEADER */
    header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: var(--bg2); border-bottom: 1px solid var(--border); z-index: 10; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo { font-family: var(--mono); font-size: 18px; font-weight: 700; letter-spacing: 4px; color: var(--purple); text-shadow: 0 0 20px rgba(127,119,221,0.5); }
    .logo-dot { display: inline-block; width: 8px; height: 8px; background: var(--purple); border-radius: 50%; margin-right: 8px; box-shadow: 0 0 8px var(--purple); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .badge-modelo { font-family: var(--mono); font-size: 11px; padding: 3px 10px; border: 1px solid var(--purple-dim); border-radius: 20px; color: var(--purple); background: var(--purple-glow); white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); transition: background 0.3s; }
    .status-dot.online  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.offline { background: var(--red); }
    .status-label { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }

    /* MAIN */
    main { display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; } }

    /* PANEL CHAT */
    .panel-chat { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
    .panel-title { padding: 12px 16px; font-size: 11px; font-family: var(--mono); letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--bg2); display: flex; align-items: center; justify-content: space-between; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chat-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text-dim); }
    .chat-empty-icon { font-size: 40px; opacity: 0.3; }
    .chat-empty p { font-family: var(--mono); font-size: 12px; letter-spacing: 1px; }

    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 92%; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user   { align-self: flex-end; }
    .msg.jarvis { align-self: flex-start; }
    .msg-meta { font-size: 10px; color: var(--text-dim); font-family: var(--mono); display: flex; align-items: center; gap: 6px; }
    .msg.user .msg-meta { justify-content: flex-end; }
    .msg-bubble { padding: 10px 14px; border-radius: 12px; font-family: var(--mono); font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-bubble   { background: var(--purple-dim); color: #fff; border-bottom-right-radius: 3px; }
    .msg.jarvis .msg-bubble { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 3px; }

    .agents-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .agent-badge { font-size: 9px; font-family: var(--mono); padding: 2px 7px; border-radius: 10px; letter-spacing: 1px; font-weight: 700; }
    .agent-badge.DENT     { background: rgba(74,222,128,0.15);  color: var(--green);  border: 1px solid rgba(74,222,128,0.3); }
    .agent-badge.BIZ      { background: rgba(251,191,36,0.15);  color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
    .agent-badge.BUILDER  { background: rgba(127,119,221,0.2);  color: var(--purple); border: 1px solid var(--purple-dim); }
    .agent-badge.EXEC     { background: rgba(248,113,113,0.15); color: var(--red);    border: 1px solid rgba(248,113,113,0.3); }
    .agent-badge.STRATEGY { background: rgba(56,189,248,0.15);  color: #38bdf8;       border: 1px solid rgba(56,189,248,0.3); }

    .typing-indicator { display: none; align-self: flex-start; padding: 10px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; border-bottom-left-radius: 3px; }
    .typing-indicator.visible { display: flex; gap: 4px; align-items: center; }
    .typing-dot { width: 6px; height: 6px; background: var(--purple); border-radius: 50%; animation: typing 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }

    .chat-input-area { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--bg2); display: flex; gap: 8px; align-items: flex-end; }
    .chat-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: var(--mono); font-size: 13px; resize: none; min-height: 42px; max-height: 120px; outline: none; transition: border-color 0.2s; line-height: 1.5; }
    .chat-input:focus { border-color: var(--purple-dim); }
    .chat-input::placeholder { color: var(--text-dim); }
    .btn-send { background: var(--purple); border: none; border-radius: 8px; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.1s; flex-shrink: 0; }
    .btn-send:hover  { background: #9590e8; }
    .btn-send:active { transform: scale(0.95); }
    .btn-send:disabled { background: var(--bg4); cursor: not-allowed; }
    .btn-send svg { width: 18px; height: 18px; fill: #fff; }

    /* PANEL DERECHO */
    .panel-right { display: flex; flex-direction: column; overflow: hidden; }
    .tabs-nav { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); }
    .tab-btn { flex: 1; padding: 14px 8px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-dim); font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .tab-btn:hover  { color: var(--text); }
    .tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); }

    .tab-content { flex: 1; overflow-y: auto; padding: 16px; }
    .tab-content::-webkit-scrollbar { width: 4px; }
    .tab-content::-webkit-scrollbar-track { background: transparent; }
    .tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .btn-action { padding: 8px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 12px; cursor: pointer; transition: border-color 0.2s, background 0.2s; display: flex; align-items: center; gap: 6px; }
    .btn-action:hover   { border-color: var(--purple-dim); background: var(--purple-glow); color: var(--purple); }
    .btn-action:active  { transform: scale(0.98); }
    .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-action .btn-icon { font-size: 14px; }

    .result-container { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .result-header { padding: 10px 14px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 11px; color: var(--text-dim); display: flex; align-items: center; justify-content: space-between; }
    .result-count { font-size: 11px; color: var(--purple); font-family: var(--mono); }
    .result-table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--mono); }
    thead th { padding: 8px 12px; text-align: left; color: var(--text-dim); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg4); }
    tbody td { padding: 8px 12px; color: var(--text); white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .empty-table { padding: 24px; text-align: center; color: var(--text-dim); font-family: var(--mono); font-size: 12px; }

    .estado-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
    .estado-activo, .estado-nuevo       { background: rgba(74,222,128,0.15);  color: var(--green); }
    .estado-inactivo, .estado-cancelado { background: rgba(248,113,113,0.15); color: var(--red); }
    .estado-pendiente, .estado-cotizado { background: rgba(251,191,36,0.15);  color: var(--yellow); }
    .estado-aprobado, .estado-produccion { background: rgba(127,119,221,0.2); color: var(--purple); }
    .estado-entregado { background: rgba(56,189,248,0.15); color: #38bdf8; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TAB SISTEMA */
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    @media (max-width: 600px) { .status-grid { grid-template-columns: 1fr; } }
    .status-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
    .status-card-label { font-size: 10px; font-family: var(--mono); color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
    .status-card-value { font-size: 18px; font-family: var(--mono); color: var(--text); font-weight: 700; }
    .status-card-value.online { color: var(--green); }
    .status-card-value.purple { color: var(--purple); }
    .agents-list { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 16px; }
    .agents-list-title { font-size: 10px; font-family: var(--mono); color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
    .agents-list-badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .refresh-info { font-size: 11px; font-family: var(--mono); color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
    .refresh-countdown { color: var(--purple); font-weight: 700; }

    /* FOOTER */
    footer { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: var(--bg2); border-top: 1px solid var(--border); font-size: 11px; font-family: var(--mono); color: var(--text-dim); }
    .footer-left  { display: flex; align-items: center; gap: 10px; }
    .footer-right { display: flex; align-items: center; gap: 10px; }
    .footer-sep { color: var(--border); }

    /* TOAST */
    .toast-container { position: fixed; bottom: 48px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 100; }
    .toast { padding: 10px 16px; border-radius: 6px; font-family: var(--mono); font-size: 12px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); animation: slideIn 0.2s ease; max-width: 280px; }
    .toast.error   { border-color: rgba(248,113,113,0.4); color: var(--red); }
    .toast.success { border-color: rgba(74,222,128,0.4);  color: var(--green); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo"><span class="logo-dot"></span>JARVIS OS</div>
      <span class="badge-modelo" id="badge-modelo">cargando...</span>
    </div>
    <div class="header-right">
      <div class="status-dot" id="header-dot"></div>
      <span class="status-label" id="header-status">conectando</span>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- PANEL CHAT -->
    <section class="panel-chat">
      <div class="panel-title">
        <span>&#x2B21; CHAT</span>
        <span id="session-label" style="font-size:10px; color: var(--purple);">dashboard_kevin</span>
      </div>

      <div class="chat-messages" id="chat-messages">
        <div class="chat-empty" id="chat-empty">
          <div class="chat-empty-icon">&#x2B21;</div>
          <p>JARVIS OS listo</p>
          <p style="font-size:11px; opacity:0.5;">Escribe un mensaje para comenzar</p>
        </div>
        <div class="typing-indicator" id="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>

      <div class="chat-input-area">
        <textarea class="chat-input" id="chat-input" placeholder="Escribe tu mensaje..." rows="1"></textarea>
        <button class="btn-send" id="btn-send" title="Enviar (Enter)">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- PANEL DERECHO -->
    <section class="panel-right">
      <nav class="tabs-nav">
        <button class="tab-btn active" data-tab="clinica">&#x1F9B7; Clinica</button>
        <button class="tab-btn" data-tab="thinkof">&#x1F5A8; ThinkOf</button>
        <button class="tab-btn" data-tab="sistema">&#x2699; Sistema</button>
      </nav>

      <div class="tab-content">

        <!-- TAB CLINICA -->
        <div class="tab-pane active" id="tab-clinica">
          <div class="action-row">
            <button class="btn-action" id="btn-pacientes">
              <span class="btn-icon">&#x1F465;</span> Ver pacientes
            </button>
            <button class="btn-action" id="btn-citas">
              <span class="btn-icon">&#x1F4C5;</span> Ver citas hoy
            </button>
          </div>
          <div class="result-container" id="clinica-result" style="display:none;">
            <div class="result-header">
              <span id="clinica-result-title">Resultados</span>
              <span class="result-count" id="clinica-result-count"></span>
            </div>
            <div class="result-table-wrap">
              <table>
                <thead id="clinica-thead"></thead>
                <tbody id="clinica-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- TAB THINKOF -->
        <div class="tab-pane" id="tab-thinkof">
          <div class="action-row">
            <button class="btn-action" id="btn-pedidos">
              <span class="btn-icon">&#x1F4E6;</span> Ver pedidos
            </button>
            <button class="btn-action" id="btn-pedidos-activos">
              <span class="btn-icon">&#x1F525;</span> Pedidos activos
            </button>
          </div>
          <div class="result-container" id="thinkof-result" style="display:none;">
            <div class="result-header">
              <span id="thinkof-result-title">Resultados</span>
              <span class="result-count" id="thinkof-result-count"></span>
            </div>
            <div class="result-table-wrap">
              <table>
                <thead id="thinkof-thead"></thead>
                <tbody id="thinkof-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- TAB SISTEMA -->
        <div class="tab-pane" id="tab-sistema">
          <div class="status-grid">
            <div class="status-card">
              <div class="status-card-label">Estado</div>
              <div class="status-card-value" id="sys-status">&#x2014;</div>
            </div>
            <div class="status-card">
              <div class="status-card-label">Motor</div>
              <div class="status-card-value purple" id="sys-motor">&#x2014;</div>
            </div>
            <div class="status-card">
              <div class="status-card-label">Modelo</div>
              <div class="status-card-value purple" id="sys-modelo" style="font-size:13px;">&#x2014;</div>
            </div>
            <div class="status-card">
              <div class="status-card-label">Sesiones activas</div>
              <div class="status-card-value purple" id="sys-sesiones">&#x2014;</div>
            </div>
          </div>

          <div class="agents-list">
            <div class="agents-list-title">Agentes disponibles</div>
            <div class="agents-list-badges" id="sys-agentes"></div>
          </div>

          <div class="refresh-info">
            <span class="spinner" id="sys-spinner" style="display:none;"></span>
            <span>Auto-refresh en</span>
            <span class="refresh-countdown" id="refresh-countdown">30</span>
            <span>seg</span>
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-left">
      <span>JARVIS OS v2</span>
      <span class="footer-sep">|</span>
      <span id="footer-motor">&#x2014;</span>
      <span class="footer-sep">|</span>
      <span id="footer-sesiones">0 sesiones</span>
    </div>
    <div class="footer-right">
      <span id="footer-time"></span>
    </div>
  </footer>

</div>

<div class="toast-container" id="toast-container"></div>

<script>
(function () {
  'use strict';

  var API = 'http://localhost:3000/api/v1';
  var SESSION_ID = 'dashboard_kevin';

  /* ---- UTILS ---- */
  function el(id) { return document.getElementById(id); }

  function toast(msg, type, duration) {
    type = type || 'info';
    duration = duration || 3500;
    var div = document.createElement('div');
    div.className = 'toast ' + type;
    div.textContent = msg;
    el('toast-container').appendChild(div);
    setTimeout(function () { div.remove(); }, duration);
  }

  function formatDate(iso) {
    if (!iso) return '-';
    try {
      return new Date(iso).toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit', year: 'numeric' });
    } catch (e) { return iso; }
  }

  function formatCurrency(val) {
    if (val == null) return '-';
    return '$' + Number(val).toLocaleString('es-CL');
  }

  function estadoBadge(estado) {
    if (!estado) return '-';
    return '<span class="estado-badge estado-' + estado.toLowerCase() + '">' + estado + '</span>';
  }

  function setLoading(btn, loading) {
    btn.disabled = loading;
    if (loading) {
      btn.dataset.orig = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span>';
    } else {
      btn.innerHTML = btn.dataset.orig || btn.innerHTML;
    }
  }

  function nowTime() {
    return new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function todayISO() {
    var d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  /* ---- FOOTER CLOCK ---- */
  function updateClock() { el('footer-time').textContent = nowTime(); }
  updateClock();
  setInterval(updateClock, 1000);

  /* ---- TABS ---- */
  var tabBtns = document.querySelectorAll('.tab-btn');
  tabBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      tabBtns.forEach(function (b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-pane').forEach(function (p) { p.classList.remove('active'); });
      btn.classList.add('active');
      el('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  /* ---- CHAT ---- */
  var chatInput  = el('chat-input');
  var btnSend    = el('btn-send');
  var chatMsgs   = el('chat-messages');
  var chatEmpty  = el('chat-empty');
  var typingInd  = el('typing-indicator');

  function scrollBottom() {
    chatMsgs.scrollTop = chatMsgs.scrollHeight;
  }

  function addMessage(role, text, agentes) {
    if (chatEmpty) { chatEmpty.style.display = 'none'; }

    var msg = document.createElement('div');
    msg.className = 'msg ' + role;

    var meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = role === 'user' ? 'Tu' : 'JARVIS';

    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    msg.appendChild(meta);
    msg.appendChild(bubble);

    if (role === 'jarvis' && agentes && agentes.length > 0) {
      var badges = document.createElement('div');
      badges.className = 'agents-badges';
      agentes.forEach(function (a) {
        var b = document.createElement('span');
        b.className = 'agent-badge ' + a;
        b.textContent = a;
        badges.appendChild(b);
      });
      msg.appendChild(badges);
    }

    chatMsgs.insertBefore(msg, typingInd);
    scrollBottom();
  }

  function setTyping(visible) {
    typingInd.className = 'typing-indicator' + (visible ? ' visible' : '');
    if (visible) scrollBottom();
  }

  async function sendMessage() {
    var text = chatInput.value.trim();
    if (!text) return;

    chatInput.value = '';
    chatInput.style.height = 'auto';
    btnSend.disabled = true;

    addMessage('user', text, null);
    setTyping(true);

    try {
      var res = await fetch(API + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensaje: text, session_id: SESSION_ID })
      });

      var data = await res.json();
      setTyping(false);

      if (!res.ok) {
        addMessage('jarvis', 'Error: ' + (data.error || 'Sin respuesta'), []);
        toast(data.error || 'Error en chat', 'error');
      } else {
        addMessage('jarvis', data.respuesta, data.agentes_activos);
        el('badge-modelo').textContent = data.modelo || 'desconocido';
      }
    } catch (err) {
      setTyping(false);
      addMessage('jarvis', 'Error de conexion con el servidor.', []);
      toast('No se pudo conectar con JARVIS', 'error');
    } finally {
      btnSend.disabled = false;
      chatInput.focus();
    }
  }

  btnSend.addEventListener('click', sendMessage);

  chatInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  chatInput.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  /* ---- STATUS / SISTEMA ---- */
  var lastStatus = null;

  async function fetchStatus() {
    el('sys-spinner').style.display = 'inline-block';
    try {
      var res  = await fetch(API + '/chat/status');
      var data = await res.json();
      lastStatus = data;

      var statusEl = el('sys-status');
      statusEl.textContent = data.status || '-';
      statusEl.className   = 'status-card-value ' + (data.status === 'online' ? 'online' : '');

      el('sys-motor').textContent   = data.motor   || '-';
      el('sys-modelo').textContent  = data.modelo  || '-';
      el('sys-sesiones').textContent = String(data.sesiones_activas || 0);

      var agentesEl = el('sys-agentes');
      agentesEl.innerHTML = '';
      if (data.agentes && data.agentes.length) {
        data.agentes.forEach(function (a) {
          var b = document.createElement('span');
          b.className = 'agent-badge ' + a;
          b.textContent = a;
          agentesEl.appendChild(b);
        });
      }

      el('badge-modelo').textContent = data.modelo || '-';
      el('footer-motor').textContent = data.motor  || '-';
      el('footer-sesiones').textContent = (data.sesiones_activas || 0) + ' sesiones';

      var dot = el('header-dot');
      var lbl = el('header-status');
      if (data.status === 'online') {
        dot.className = 'status-dot online';
        lbl.textContent = 'online';
      } else {
        dot.className = 'status-dot offline';
        lbl.textContent = 'offline';
      }

    } catch (err) {
      el('header-dot').className = 'status-dot offline';
      el('header-status').textContent = 'offline';
      el('badge-modelo').textContent = 'sin conexion';
    } finally {
      el('sys-spinner').style.display = 'none';
    }
  }

  /* Auto-refresh sistema cada 30s */
  var countdown = 30;
  fetchStatus();

  setInterval(function () {
    countdown--;
    el('refresh-countdown').textContent = countdown;
    if (countdown <= 0) {
      countdown = 30;
      fetchStatus();
    }
  }, 1000);

  /* ---- TABLA GENERICA ---- */
  function renderTable(theadId, tbodyId, rows, columns) {
    var thead = el(theadId);
    var tbody = el(tbodyId);
    thead.innerHTML = '';
    tbody.innerHTML = '';

    if (!rows || rows.length === 0) {
      var tr = document.createElement('tr');
      var td = document.createElement('td');
      td.colSpan = columns.length;
      td.className = 'empty-table';
      td.textContent = 'Sin resultados';
      tr.appendChild(td);
      tbody.appendChild(tr);
      return;
    }

    var trh = document.createElement('tr');
    columns.forEach(function (col) {
      var th = document.createElement('th');
      th.textContent = col.label;
      trh.appendChild(th);
    });
    thead.appendChild(trh);

    rows.forEach(function (row) {
      var tr = document.createElement('tr');
      columns.forEach(function (col) {
        var td = document.createElement('td');
        var val = row[col.key];
        if (col.type === 'date')     { td.textContent = formatDate(val); }
        else if (col.type === 'currency') { td.textContent = formatCurrency(val); }
        else if (col.type === 'estado')   { td.innerHTML  = estadoBadge(val); }
        else if (col.type === 'actions')  {
          var btnOdonto = document.createElement('button');
          btnOdonto.style.cssText = 'padding:4px 10px;border-radius:6px;border:1px solid #7F77DD;background:transparent;color:#7F77DD;font-size:12px;cursor:pointer';
          btnOdonto.textContent = 'Odontograma';
          btnOdonto.onclick = function() {
            window.open('/odontograma.html?paciente_id=' + row.id, '_blank');
          };
          td.appendChild(btnOdonto);
        }
        else { td.textContent = (val != null ? val : '-'); }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }

  /* ---- TAB CLINICA ---- */
  var COLS_PACIENTES = [
    { key: 'id',       label: 'ID' },
    { key: 'nombre',   label: 'Nombre' },
    { key: 'rut',      label: 'RUT' },
    { key: 'telefono', label: 'Telefono' },
    { key: 'estado',   label: 'Estado', type: 'estado' },
    { key: 'created_at', label: 'Registro', type: 'date' },
    { key: 'acciones', label: 'Acciones', type: 'actions' }
  ];

  var COLS_CITAS = [
    { key: 'id',          label: 'ID' },
    { key: 'paciente_id', label: 'Paciente' },
    { key: 'fecha',       label: 'Fecha', type: 'date' },
    { key: 'hora',        label: 'Hora' },
    { key: 'motivo',      label: 'Motivo' },
    { key: 'estado',      label: 'Estado', type: 'estado' }
  ];

  el('btn-pacientes').addEventListener('click', async function () {
    var btn = this;
    setLoading(btn, true);
    try {
      var res  = await fetch(API + '/pacientes');
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error');
      var rows = data.pacientes || [];
      el('clinica-result-title').textContent = 'Pacientes';
      el('clinica-result-count').textContent = rows.length + ' registros';
      renderTable('clinica-thead', 'clinica-tbody', rows, COLS_PACIENTES);
      el('clinica-result').style.display = 'block';
      toast('Pacientes cargados: ' + rows.length, 'success');
    } catch (err) {
      toast('Error: ' + err.message, 'error');
    } finally {
      setLoading(btn, false);
    }
  });

  el('btn-citas').addEventListener('click', async function () {
    var btn = this;
    setLoading(btn, true);
    try {
      var hoy  = todayISO();
      var res  = await fetch(API + '/citas?fecha=' + hoy);
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error');
      var rows = data.citas || data || [];
      if (!Array.isArray(rows)) rows = [];
      el('clinica-result-title').textContent = 'Citas hoy (' + hoy + ')';
      el('clinica-result-count').textContent = rows.length + ' registros';
      renderTable('clinica-thead', 'clinica-tbody', rows, COLS_CITAS);
      el('clinica-result').style.display = 'block';
      toast('Citas cargadas: ' + rows.length, 'success');
    } catch (err) {
      toast('Error: ' + err.message, 'error');
    } finally {
      setLoading(btn, false);
    }
  });

  /* ---- TAB THINKOF ---- */
  var COLS_PEDIDOS = [
    { key: 'id',              label: 'ID' },
    { key: 'empresa',         label: 'Empresa' },
    { key: 'producto',        label: 'Producto' },
    { key: 'cantidad',        label: 'Cant.' },
    { key: 'estado',          label: 'Estado', type: 'estado' },
    { key: 'precio_estimado', label: 'Precio Est.', type: 'currency' },
    { key: 'created_at',      label: 'Fecha', type: 'date' }
  ];

  el('btn-pedidos').addEventListener('click', async function () {
    var btn = this;
    setLoading(btn, true);
    try {
      var res  = await fetch(API + '/pedidos');
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error');
      var rows = data.pedidos || [];
      el('thinkof-result-title').textContent = 'Todos los pedidos';
      el('thinkof-result-count').textContent = rows.length + ' registros';
      renderTable('thinkof-thead', 'thinkof-tbody', rows, COLS_PEDIDOS);
      el('thinkof-result').style.display = 'block';
      toast('Pedidos cargados: ' + rows.length, 'success');
    } catch (err) {
      toast('Error: ' + err.message, 'error');
    } finally {
      setLoading(btn, false);
    }
  });

  el('btn-pedidos-activos').addEventListener('click', async function () {
    var btn = this;
    setLoading(btn, true);
    try {
      var res  = await fetch(API + '/pedidos?estado=nuevo');
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error');
      var rows = data.pedidos || [];
      el('thinkof-result-title').textContent = 'Pedidos activos (nuevo)';
      el('thinkof-result-count').textContent = rows.length + ' registros';
      renderTable('thinkof-thead', 'thinkof-tbody', rows, COLS_PEDIDOS);
      el('thinkof-result').style.display = 'block';
      toast('Pedidos activos: ' + rows.length, 'success');
    } catch (err) {
      toast('Error: ' + err.message, 'error');
    } finally {
      setLoading(btn, false);
    }
  });

  /* ---- INIT ---- */
  chatInput.focus();

})();
</script>
</body>
</html>
