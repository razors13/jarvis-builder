<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odontograma — Jarvis OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
      min-height: 100vh;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(127, 119, 221, 0.1);
      border-radius: 12px;
      border: 1px solid rgba(127, 119, 221, 0.3);
    }
    .header h1 {
      font-size: 24px;
      color: #7F77DD;
    }
    .header .patient-name {
      font-size: 18px;
      color: #e0e0e0;
      margin-top: 5px;
    }
    .buttons {
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-save {
      background: #7F77DD;
      color: white;
    }
    .btn-save:hover {
      background: #6B63C5;
      transform: translateY(-1px);
    }
    .btn-back {
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-back:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .message {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 25px;
      background: #7F77DD;
      color: white;
      border-radius: 8px;
      font-weight: 600;
      opacity: 0;
      transform: translateY(-20px);
      transition: all 0.3s;
      z-index: 1000;
    }
    .message.show {
      opacity: 1;
      transform: translateY(0);
    }
    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .legend-color {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .odontograma {
      display: flex;
      flex-direction: column;
      gap: 40px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .arch {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tooth {
      position: relative;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .tooth:hover {
      transform: scale(1.05);
    }
    .tooth-number {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 600;
      color: #7F77DD;
    }
    .arch.lower .tooth-number {
      top: auto;
      bottom: -20px;
    }
    svg {
      display: block;
    }
    .surface {
      cursor: pointer;
      transition: fill 0.2s;
    }
    .surface:hover {
      opacity: 0.8;
    }
    .tools {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      flex-wrap: wrap;
    }
    .tool-btn {
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid transparent;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tool-btn.active {
      border-color: #7F77DD;
      background: rgba(127, 119, 221, 0.2);
    }
    .tool-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #7F77DD;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>📋 Odontograma Clínico</h1>
      <div class="patient-name" id="patientName">Cargando...</div>
    </div>
    <div class="buttons">
      <button class="btn-save" onclick="saveOdontograma()">💾 Guardar</button>
      <button class="btn-back" onclick="goBack()">← Volver</button>
    </div>
  </div>

  <div class="message" id="message"></div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-color" style="background: #e8e0c8;"></div>
      <span>Sano</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #E24B4A;"></div>
      <span>Caries</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #378ADD;"></div>
      <span>Restaurado</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #EF9F27;"></div>
      <span>Corona</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #D4537E;"></div>
      <span>Endodoncia</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #7F77DD;"></div>
      <span>Implante</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background: #C8C4BA;"></div>
      <span>Extracción</span>
    </div>
  </div>

  <div class="tools">
    <button class="tool-btn active" data-tool="sano" onclick="selectTool('sano')">Sano</button>
    <button class="tool-btn" data-tool="caries" onclick="selectTool('caries')">Caries</button>
    <button class="tool-btn" data-tool="restaurado" onclick="selectTool('restaurado')">Restaurado</button>
    <button class="tool-btn" data-tool="corona" onclick="selectTool('corona')">Corona</button>
    <button class="tool-btn" data-tool="endodoncia" onclick="selectTool('endodoncia')">Endodoncia</button>
    <button class="tool-btn" data-tool="implante" onclick="selectTool('implante')">Implante</button>
    <button class="tool-btn" data-tool="extraccion" onclick="selectTool('extraccion')">Extracción</button>
  </div>

  <div class="odontograma">
    <div class="arch upper" id="upperArch"></div>
    <div class="arch lower" id="lowerArch"></div>
  </div>

  <script>
    const COLORS = {
      sano: '#e8e0c8',
      caries: '#E24B4A',
      restaurado: '#378ADD',
      corona: '#EF9F27',
      endodoncia: '#D4537E',
      implante: '#7F77DD',
      extraccion: '#C8C4BA'
    };

    const UPPER_TEETH = [18, 17, 16, 15, 14, 13, 12, 11, 21, 22, 23, 24, 25, 26, 27, 28];
    const LOWER_TEETH = [48, 47, 46, 45, 44, 43, 42, 41, 31, 32, 33, 34, 35, 36, 37, 38];

    let currentTool = 'sano';
    let patientId = null;
    let patientName = '';
    let odontogramaState = {
      surfs: {},
      crown: {},
      root: {},
      status: {}
    };

    // Obtener ID del paciente de la URL
    const urlParams = new URLSearchParams(window.location.search);
    patientId = urlParams.get('paciente_id');

    if (!patientId) {
      alert('No se especificó ID de paciente');
      window.location.href = 'index.html';
    }

    // Cargar datos del paciente
    async function loadPatientData() {
      try {
        const response = await fetch(`/api/v1/pacientes/${patientId}/odontograma`);
        if (!response.ok) throw new Error('Error al cargar datos');
        
        const data = await response.json();
        patientName = data.nombre;
        document.getElementById('patientName').textContent = data.nombre;
        
        if (data.odontograma) {
          odontogramaState = {
            surfs: data.odontograma.surfs || {},
            crown: data.odontograma.crown || {},
            root: data.odontograma.root || {},
            status: data.odontograma.status || {}
          };
        }
        
        renderOdontograma();
      } catch (error) {
        console.error('Error:', error);
        showMessage('Error al cargar datos del paciente', 'error');
      }
    }

    function selectTool(tool) {
      currentTool = tool;
      document.querySelectorAll('.tool-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tool === tool);
      });
    }

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.style.background = type === 'error' ? '#E24B4A' : '#7F77DD';
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 3000);
    }

    function goBack() {
      window.location.href = 'index.html';
    }

    async function saveOdontograma() {
      try {
        const response = await fetch(`/api/v1/pacientes/${patientId}/odontograma`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(odontogramaState)
        });
        
        if (!response.ok) throw new Error('Error al guardar');
        
        showMessage('✓ Odontograma guardado exitosamente');
      } catch (error) {
        console.error('Error:', error);
        showMessage('Error al guardar odontograma', 'error');
      }
    }

    function isPosterior(toothNum) {
      const lastDigit = toothNum % 10;
      return lastDigit >= 4 && lastDigit <= 8;
    }

    function createPosteriorTooth(toothNum) {
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', '60');
      svg.setAttribute('height', '80');
      svg.setAttribute('viewBox', '0 0 60 80');

      // Corona con superficies
      const surfaces = [
        { id: 'o', d: 'M20,25 L40,25 L40,45 L20,45 Z', label: 'O' }, // Oclusal
        { id: 'm', d: 'M15,20 L20,25 L20,45 L15,50 Z', label: 'M' }, // Mesial
        { id: 'd', d: 'M40,25 L45,20 L45,50 L40,45 Z', label: 'D' }, // Distal
        { id: 'v', d: 'M20,25 L15,20 L45,20 L40,25 Z', label: 'V' }, // Vestibular
        { id: 'l', d: 'M20,45 L15,50 L45,50 L40,45 Z', label: 'L' }  // Lingual
      ];

      surfaces.forEach(surf => {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', surf.d);
        path.setAttribute('class', 'surface');
        path.setAttribute('data-tooth', toothNum);
        path.setAttribute('data-surface', surf.id);
        
        const state = odontogramaState.surfs[toothNum]?.[surf.id] || 'sano';
        path.setAttribute('fill', COLORS[state]);
        path.setAttribute('stroke', '#333');
        path.setAttribute('stroke-width', '1');
        
        path.addEventListener('click', () => handleSurfaceClick(toothNum, surf.id));
        svg.appendChild(path);
      });

      // Raíces
      const root1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      root1.setAttribute('d', 'M22,50 L25,75 L20,75 Z');
      root1.setAttribute('class', 'surface');
      root1.setAttribute('data-tooth', toothNum);
      root1.setAttribute('data-type', 'root');
      const rootState = odontogramaState.root[toothNum] || 'sano';
      root1.setAttribute('fill', COLORS[rootState]);
      root1.setAttribute('stroke', '#333');
      root1.addEventListener('click', () => handleRootClick(toothNum));
      svg.appendChild(root1);

      const root2 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      root2.setAttribute('d', 'M38,50 L40,75 L35,75 Z');
      root2.setAttribute('class', 'surface');
      root2.setAttribute('data-tooth', toothNum);
      root2.setAttribute('data-type', 'root');
      root2.setAttribute('fill', COLORS[rootState]);
      root2.setAttribute('stroke', '#333');
      root2.addEventListener('click', () => handleRootClick(toothNum));
      svg.appendChild(root2);

      return svg;
    }

    function createAnteriorTooth(toothNum) {
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', '50');
      svg.setAttribute('height', '80');
      svg.setAttribute('viewBox', '0 0 50 80');

      // Corona con 9 zonas (3x3)
      const zones = [
        { id: 'vi', x: 10, y: 15, w: 10, h: 12 }, // Vestibular Incisal
        { id: 'vm', x: 10, y: 27, w: 10, h: 12 }, // Vestibular Medio
        { id: 'vc', x: 10, y: 39, w: 10, h: 12 }, // Vestibular Cervical
        { id: 'i', x: 20, y: 15, w: 10, h: 12 },  // Incisal
        { id: 'c', x: 20, y: 27, w: 10, h: 12 },  // Centro
        { id: 'cc', x: 20, y: 39, w: 10, h: 12 }, // Centro Cervical
        { id: 'li', x: 30, y: 15, w: 10, h: 12 }, // Lingual Incisal
        { id: 'lm', x: 30, y: 27, w: 10, h: 12 }, // Lingual Medio
        { id: 'lc', x: 30, y: 39, w: 10, h: 12 }  // Lingual Cervical
      ];

      zones.forEach(zone => {
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', zone.x);
        rect.setAttribute('y', zone.y);
        rect.setAttribute('width', zone.w);
        rect.setAttribute('height', zone.h);
        rect.setAttribute('class', 'surface');
        rect.setAttribute('data-tooth', toothNum);
        rect.setAttribute('data-surface', zone.id);
        
        const state = odontogramaState.surfs[toothNum]?.[zone.id] || 'sano';
        rect.setAttribute('fill', COLORS[state]);
        rect.setAttribute('stroke', '#333');
        rect.setAttribute('stroke-width', '1');
        
        rect.addEventListener('click', () => handleSurfaceClick(toothNum, zone.id));
        svg.appendChild(rect);
      });

      // Raíz única
      const root = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      root.setAttribute('d', 'M20,51 L25,75 L15,75 Z');
      root.setAttribute('class', 'surface');
      root.setAttribute('data-tooth', toothNum);
      root.setAttribute('data-type', 'root');
      const rootState = odontogramaState.root[toothNum] || 'sano';
      root.setAttribute('fill', COLORS[rootState]);
      root.setAttribute('stroke', '#333');
      root.addEventListener('click', () => handleRootClick(toothNum));
      svg.appendChild(root);

      return svg;
    }

    function handleSurfaceClick(toothNum, surfaceId) {
      if (!odontogramaState.surfs[toothNum]) {
        odontogramaState.surfs[toothNum] = {};
      }
      odontogramaState.surfs[toothNum][surfaceId] = currentTool;
      renderOdontograma();
    }

    function handleRootClick(toothNum) {
      odontogramaState.root[toothNum] = currentTool;
      renderOdontograma();
    }

    function renderOdontograma() {
      const upperArch = document.getElementById('upperArch');
      const lowerArch = document.getElementById('lowerArch');
      
      upperArch.innerHTML = '';
      lowerArch.innerHTML = '';

      UPPER_TEETH.forEach(toothNum => {
        const container = document.createElement('div');
        container.className = 'tooth';
        
        const number = document.createElement('div');
        number.className = 'tooth-number';
        number.textContent = toothNum;
        container.appendChild(number);
        
        const svg = isPosterior(toothNum) ? createPosteriorTooth(toothNum) : createAnteriorTooth(toothNum);
        container.appendChild(svg);
        
        upperArch.appendChild(container);
      });

      LOWER_TEETH.forEach(toothNum => {
        const container = document.createElement('div');
        container.className = 'tooth';
        
        const svg = isPosterior(toothNum) ? createPosteriorTooth(toothNum) : createAnteriorTooth(toothNum);
        container.appendChild(svg);
        
        const number = document.createElement('div');
        number.className = 'tooth-number';
        number.textContent = toothNum;
        container.appendChild(number);
        
        lowerArch.appendChild(container);
      });
    }

    // Inicializar
    loadPatientData();
  </script>
</body>
</html>
