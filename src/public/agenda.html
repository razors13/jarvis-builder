<!DOCTYPE html>
<html lang="es">
<head>
<script src="/theme.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda — Jarvis OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:rgba(127,119,221,.08);border-bottom:1px solid rgba(127,119,221,.2)}
.header h1{font-size:18px;color:#7F77DD;font-weight:600}
.header-right{display:flex;gap:10px;align-items:center}
.btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:#7F77DD;color:#fff}
.btn-primary:hover{background:#6B63C5}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border)}

/* NAV BAR */
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap}
.nav-left{display:flex;align-items:center;gap:8px}
.nav-center{display:flex;align-items:center;gap:8px}
.nav-right{display:flex;align-items:center;gap:6px}
.month-label{font-size:16px;font-weight:600;color:var(--text);min-width:160px;text-align:center}
.nav-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:13px;cursor:pointer;transition:all .15s}
.nav-btn:hover{background:var(--border);color:var(--text)}
.today-btn{padding:6px 14px;border-radius:6px;border:1px solid rgba(127,119,221,.4);background:rgba(127,119,221,.1);color:#7F77DD;font-size:13px;cursor:pointer}
.today-btn:hover{background:rgba(127,119,221,.2)}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.view-btn{padding:6px 14px;background:transparent;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;transition:all .15s}
.view-btn.active{background:rgba(127,119,221,.2);color:#7F77DD}
.view-btn:hover:not(.active){background:rgba(255,255,255,.05);color:var(--text)}

/* MONTHLY VIEW */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border)}
.month-day-header{padding:8px;text-align:center;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.month-cell{min-height:90px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px;cursor:pointer;transition:background .15s;position:relative}
.month-cell:hover{background:rgba(127,119,221,.05)}
.month-cell.other-month{opacity:.3}
.month-cell.today{background:rgba(127,119,221,.06)}
.month-cell.today .day-num{color:#7F77DD;font-weight:700}
.month-cell.selected{background:rgba(127,119,221,.1);border:1px solid rgba(127,119,221,.3)}
.day-num{font-size:13px;color:var(--text);margin-bottom:4px;display:inline-block;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.month-cita{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.month-more{font-size:10px;color:#7F77DD;margin-top:2px}

/* WEEKLY VIEW */
.week-grid{display:grid;grid-template-columns:52px repeat(7,1fr);border-left:1px solid var(--border)}
.day-header{padding:8px 4px;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.day-header.today-col{background:rgba(127,119,221,.08);border-bottom:2px solid #7F77DD}
.day-name{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}
.day-num-w{font-size:18px;font-weight:600;color:var(--text);margin-top:2px}
.day-header.today-col .day-num-w{color:#7F77DD}
.time-col{border-right:1px solid var(--border)}
.time-slot{height:56px;display:flex;align-items:flex-start;justify-content:flex-end;padding:3px 6px 0;font-size:10px;color:var(--text-dim);border-bottom:1px solid rgba(255,255,255,.04)}
.day-col{position:relative;border-right:1px solid var(--border)}
.day-col.today-col{background:rgba(127,119,221,.02)}
.hour-cell{height:56px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s}
.hour-cell:hover{background:rgba(127,119,221,.08)}
.cita-block{position:absolute;left:2px;right:2px;border-radius:5px;padding:3px 5px;font-size:10px;cursor:pointer;z-index:10;overflow:hidden}
.cita-block:hover{opacity:.85;z-index:20}
.cita-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cita-sub{font-size:9px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid rgba(127,119,221,.3);border-radius:14px;padding:24px;width:420px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;color:#7F77DD;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus{border-color:rgba(127,119,221,.5)}
.form-group select option{background:var(--bg2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.detail-modal{background:var(--bg2);border:1px solid rgba(127,119,221,.3);border-radius:14px;padding:24px;width:360px;max-width:95vw}
.detail-field{margin-bottom:10px}
.detail-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.detail-val{font-size:13px;color:var(--text)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-programada{background:rgba(127,119,221,.2);color:#7F77DD}
.badge-confirmada{background:rgba(29,158,117,.2);color:#1D9E75}
.badge-completada{background:rgba(29,158,117,.15);color:#1D9E75}
.badge-cancelada{background:rgba(226,75,74,.15);color:#E24B4A}
.badge-no_asistio{background:rgba(136,135,128,.15);color:#888}
.msg{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);transition:all .3s;z-index:200}
.msg.show{opacity:1;transform:translateY(0)}
.cal-wrap{overflow-x:auto}
</style>
</head>
<body>

<div class="header">
  <h1>Agenda Clinica</h1>
  <div class="header-right">
    <button class="btn btn-ghost" onclick="window.location.href='index.html'">← Dashboard</button>
    <button class="btn btn-ghost" onclick="toggleTheme()" id="theme-toggle" style="font-size:14px;padding:5px 10px">☀️</button>
    <button class="btn btn-primary" onclick="openNewCita()">+ Nueva Cita</button>
  </div>
</div>

<div class="nav-bar">
  <div class="nav-left">
    <div class="view-toggle">
      <button class="view-btn active" id="btn-view-month" onclick="setView('month')">Mes</button>
      <button class="view-btn" id="btn-view-week" onclick="setView('week')">Semana</button>
    </div>
  </div>
  <div class="nav-center">
    <button class="nav-btn" onclick="navPrev()">←</button>
    <span class="month-label" id="nav-label"></span>
    <button class="nav-btn" onclick="navNext()">→</button>
  </div>
  <div class="nav-right">
    <button class="today-btn" onclick="goToday()">Hoy</button>
  </div>
</div>

<div class="cal-wrap" id="cal-wrap"></div>

<!-- Modal nueva cita -->
<div class="modal-bg" id="new-modal">
  <div class="modal">
    <h2>Nueva Cita</h2>
    <div class="form-group">
      <label>Paciente</label>
      <select id="f-paciente"><option value="">Seleccionar...</option></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha</label>
        <input type="date" id="f-fecha">
      </div>
      <div class="form-group">
        <label>Hora</label>
        <input type="time" id="f-hora" min="09:00" max="19:00" step="900">
      </div>
    </div>
    <div class="form-group">
      <label>Tratamiento</label>
      <select id="f-tratamiento">
        <option value="consulta_general">Consulta general (30 min)</option>
        <option value="limpieza">Limpieza dental (60 min)</option>
        <option value="extraccion">Extraccion (45 min)</option>
        <option value="endodoncia">Endodoncia (90 min)</option>
        <option value="ortodoncia">Ortodoncia (60 min)</option>
        <option value="implante">Implante (120 min)</option>
        <option value="blanqueamiento">Blanqueamiento (90 min)</option>
        <option value="radiografia">Radiografia (20 min)</option>
        <option value="otro">Otro (30 min)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notas</label>
      <textarea id="f-notas" rows="2" placeholder="Opcional..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitCita()">Agendar</button>
    </div>
  </div>
</div>

<!-- Modal detalle -->
<div class="modal-bg" id="detail-modal">
  <div class="detail-modal">
    <h2 id="d-trat" style="font-size:15px;color:#7F77DD;margin-bottom:14px"></h2>
    <div class="detail-field"><div class="detail-label">Paciente</div><div class="detail-val" id="d-pac"></div></div>
    <div class="detail-field"><div class="detail-label">Fecha y hora</div><div class="detail-val" id="d-fecha"></div></div>
    <div class="detail-field"><div class="detail-label">Duracion</div><div class="detail-val" id="d-dur"></div></div>
    <div class="detail-field"><div class="detail-label">Estado</div><div class="detail-val" id="d-estado"></div></div>
    <div class="detail-field" id="d-notas-wrap"><div class="detail-label">Notas</div><div class="detail-val" id="d-notas"></div></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cerrar</button>
      <button class="btn" id="d-confirm-btn" style="background:#1D9E75;color:#fff" onclick="cambiarEstado('confirmada')">Confirmar</button>
      <button class="btn" style="background:#E24B4A;color:#fff" onclick="cambiarEstado('cancelada')">Cancelar</button>
      <button class="btn btn-primary" onclick="irHistoria()">Historia</button>
    </div>
  </div>
</div>

<div class="msg" id="msg"></div>

<script>
const TRAT_LABEL={consulta_general:'Consulta',limpieza:'Limpieza',extraccion:'Extraccion',endodoncia:'Endodoncia',ortodoncia:'Ortodoncia',implante:'Implante',blanqueamiento:'Blanqueamiento',radiografia:'Radiografia',otro:'Otro'};
const TRAT_COLOR={consulta_general:'#534AB7',limpieza:'#1D9E75',extraccion:'#E24B4A',endodoncia:'#D4537E',ortodoncia:'#0F6E56',implante:'#7F77DD',blanqueamiento:'#EF9F27',radiografia:'#378ADD',otro:'#888780'};
const DIAS_SHORT=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let view='month';
let currentDate=new Date();
let allCitas=[];
let allPacientes=[];
let selectedCita=null;

function setView(v){
  view=v;
  document.getElementById('btn-view-month').classList.toggle('active',v==='month');
  document.getElementById('btn-view-week').classList.toggle('active',v==='week');
  render();
}

function navPrev(){
  if(view==='month'){currentDate.setMonth(currentDate.getMonth()-1);}
  else{currentDate.setDate(currentDate.getDate()-7);}
  render();
}

function navNext(){
  if(view==='month'){currentDate.setMonth(currentDate.getMonth()+1);}
  else{currentDate.setDate(currentDate.getDate()+7);}
  render();
}

function goToday(){currentDate=new Date();render();}

function isToday(d){
  const t=new Date();
  return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear();
}

function getMonday(d){
  const dt=new Date(d);
  const day=dt.getDay();
  const diff=dt.getDate()-day+(day===0?-6:1);
  dt.setDate(diff); dt.setHours(0,0,0,0);
  return dt;
}

function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}

function fmtTime(iso){
  const d=new Date(iso);
  return d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
}

function citasDelDia(date){
  const ds=date.toISOString().substring(0,10);
  return allCitas.filter(c=>new Date(c.fecha_hora_inicio).toISOString().substring(0,10)===ds&&c.estado!=='cancelada');
}

function getPaciente(pid){
  const p=allPacientes.find(x=>x.id==pid);
  return p?p.nombre:'Paciente';
}

function render(){
  if(view==='month')renderMonth();
  else renderWeek();
}

function renderMonth(){
  const y=currentDate.getFullYear();
  const m=currentDate.getMonth();
  document.getElementById('nav-label').textContent=`${MESES[m]} ${y}`;

  const wrap=document.getElementById('cal-wrap');
  let html='<div class="month-grid">';

  // Headers Lun-Dom
  ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].forEach(d=>{
    html+=`<div class="month-day-header">${d}</div>`;
  });

  // Primera celda: lunes de la semana que contiene el 1 del mes
  const firstDay=new Date(y,m,1);
  let startDow=firstDay.getDay(); // 0=dom
  // Convertir a lunes=0
  startDow=(startDow===0)?6:startDow-1;

  const lastDay=new Date(y,m+1,0).getDate();
  const totalCells=Math.ceil((startDow+lastDay)/7)*7;

  for(let i=0;i<totalCells;i++){
    const dayOffset=i-startDow;
    const cellDate=new Date(y,m,1+dayOffset);
    const isCurrentMonth=cellDate.getMonth()===m;
    const todayClass=isToday(cellDate)?' today':'';
    const otherClass=isCurrentMonth?'':' other-month';
    const ds=cellDate.toISOString().substring(0,10);

    const citas=citasDelDia(cellDate);
    let citasHtml='';
    const max=3;
    citas.slice(0,max).forEach(c=>{
      const col=TRAT_COLOR[c.tratamiento]||'#534AB7';
      citasHtml+=`<div class="month-cita" style="background:${col}22;border-left:2px solid ${col};color:${col}" onclick="event.stopPropagation();openDetail(${JSON.stringify(c).replace(/"/g,'&quot;')})">${fmtTime(c.fecha_hora_inicio)} ${TRAT_LABEL[c.tratamiento]||c.tratamiento}</div>`;
    });
    if(citas.length>max){citasHtml+=`<div class="month-more">+${citas.length-max} más</div>`;}

    html+=`<div class="month-cell${todayClass}${otherClass}" onclick="openNewCitaAt('${ds}')">
      <div class="day-num">${cellDate.getDate()}</div>
      ${citasHtml}
    </div>`;
  }

  html+='</div>';
  wrap.innerHTML=html;
}

function renderWeek(){
  const monday=getMonday(currentDate);
  const sunday=addDays(monday,6);
  document.getElementById('nav-label').textContent=
    `${monday.getDate()} ${MESES[monday.getMonth()].substring(0,3)} — ${sunday.getDate()} ${MESES[sunday.getMonth()].substring(0,3)} ${sunday.getFullYear()}`;

  const wrap=document.getElementById('cal-wrap');
  let html='<div class="week-grid" style="min-width:640px">';

  // Header vacío + 7 días
  html+='<div class="day-header time-col" style="border-right:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.02)"></div>';
  for(let i=0;i<7;i++){
    const day=addDays(monday,i);
    const tc=isToday(day)?' today-col':'';
    html+=`<div class="day-header${tc}">
      <div class="day-name">${DIAS_SHORT[(day.getDay())]}</div>
      <div class="day-num-w">${day.getDate()}</div>
    </div>`;
  }

  // Horas 9-19
  for(let h=9;h<19;h++){
    html+=`<div class="time-col"><div class="time-slot">${String(h).padStart(2,'0')}:00</div></div>`;
    for(let i=0;i<7;i++){
      const day=addDays(monday,i);
      const tc=isToday(day)?' today-col':'';
      const ds=day.toISOString().substring(0,10);
      const citasAqui=allCitas.filter(c=>{
        if(c.estado==='cancelada')return false;
        const ci=new Date(c.fecha_hora_inicio);
        return ci.toISOString().substring(0,10)===ds&&ci.getHours()===h;
      });
      let blocksHtml='';
      citasAqui.forEach(c=>{
        const ci=new Date(c.fecha_hora_inicio);
        const cf=new Date(c.fecha_hora_fin);
        const durMin=(cf-ci)/60000;
        const top=(ci.getMinutes()/60)*100;
        const height=Math.max((durMin/60)*100,10);
        const col=TRAT_COLOR[c.tratamiento]||'#534AB7';
        const cd=JSON.stringify(c).replace(/"/g,'&quot;');
        blocksHtml+=`<div class="cita-block" style="top:${top}%;height:${height}%;background:${col}22;border-left:3px solid ${col};color:${col}" onclick="event.stopPropagation();openDetail(${cd})">
          <div class="cita-title">${TRAT_LABEL[c.tratamiento]||c.tratamiento}</div>
          <div class="cita-sub">${getPaciente(c.paciente_id)}</div>
        </div>`;
      });
      html+=`<div class="day-col hour-cell${tc}" onclick="openNewCitaAt('${ds}',${h})">${blocksHtml}</div>`;
    }
  }

  html+='</div>';
  wrap.innerHTML=html;
}

function openNewCita(){
  const today=new Date().toISOString().substring(0,10);
  document.getElementById('f-fecha').value=today;
  document.getElementById('f-hora').value='09:00';
  document.getElementById('f-notas').value='';
  document.getElementById('f-paciente').value='';
  document.getElementById('new-modal').classList.add('open');
}

function openNewCitaAt(dateStr,hour){
  document.getElementById('f-fecha').value=dateStr;
  document.getElementById('f-hora').value=hour!=null?`${String(hour).padStart(2,'0')}:00`:'09:00';
  document.getElementById('f-notas').value='';
  document.getElementById('f-paciente').value='';
  document.getElementById('new-modal').classList.add('open');
}

async function submitCita(){
  const pid=document.getElementById('f-paciente').value;
  const fecha=document.getElementById('f-fecha').value;
  const hora=document.getElementById('f-hora').value;
  const trat=document.getElementById('f-tratamiento').value;
  const notas=document.getElementById('f-notas').value;
  if(!pid){showMsg('Selecciona un paciente','error');return;}
  if(!fecha||!hora){showMsg('Selecciona fecha y hora','error');return;}
  try{
    const r=await fetch('/api/v1/citas',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({paciente_id:parseInt(pid),fecha_hora:`${fecha}T${hora}:00`,tratamiento:trat,notas:notas||null})});
    const d=await r.json();
    if(!r.ok){showMsg(r.status===409?'Conflicto: ya hay una cita a esa hora':d.error||'Error','error');return;}
    closeModals();
    showMsg('Cita agendada');
    await loadCitas();
    render();
  }catch(e){showMsg('Error de conexion','error');}
}

function openDetail(cita){
  if(typeof cita==='string')cita=JSON.parse(cita);
  selectedCita=cita;
  document.getElementById('d-trat').textContent=TRAT_LABEL[cita.tratamiento]||cita.tratamiento;
  document.getElementById('d-pac').textContent=getPaciente(cita.paciente_id);
  const fi=new Date(cita.fecha_hora_inicio);
  document.getElementById('d-fecha').textContent=
    fi.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'})+' — '+
    fmtTime(cita.fecha_hora_inicio)+' a '+fmtTime(cita.fecha_hora_fin);
  document.getElementById('d-dur').textContent=cita.duracion_minutos+' minutos';
  document.getElementById('d-estado').innerHTML=`<span class="badge badge-${cita.estado}">${cita.estado}</span>`;
  const nw=document.getElementById('d-notas-wrap');
  if(cita.notas){document.getElementById('d-notas').textContent=cita.notas;nw.style.display='';}
  else nw.style.display='none';
  document.getElementById('d-confirm-btn').style.display=cita.estado==='programada'?'':'none';
  document.getElementById('detail-modal').classList.add('open');
}

async function cambiarEstado(estado){
  if(!selectedCita)return;
  try{
    const r=await fetch(`/api/v1/citas/${selectedCita.id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({estado})});
    if(!r.ok)throw new Error();
    closeModals();
    showMsg(estado==='confirmada'?'Cita confirmada':'Cita cancelada');
    await loadCitas(); render();
  }catch(e){showMsg('Error al actualizar','error');}
}

function irHistoria(){
  if(selectedCita)window.location.href=`/historia.html?paciente_id=${selectedCita.paciente_id}`;
}

function closeModals(){
  document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('open'));
  selectedCita=null;
}

document.querySelectorAll('.modal-bg').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)closeModals();});
});

function showMsg(txt,type='success'){
  const m=document.getElementById('msg');
  m.textContent=txt;
  m.style.background=type==='error'?'#E24B4A':'#1D9E75';
  m.classList.add('show');
  setTimeout(()=>m.classList.remove('show'),3000);
}

async function loadPacientes(){
  try{
    const r=await fetch('/api/v1/pacientes');
    const d=await r.json();
    allPacientes=d.pacientes||[];
    const sel=document.getElementById('f-paciente');
    allPacientes.forEach(p=>{
      const o=document.createElement('option');
      o.value=p.id; o.textContent=`${p.nombre} (${p.rut})`;
      sel.appendChild(o);
    });
  }catch(e){console.error(e);}
}

async function loadCitas(){
  try{
    const r=await fetch('/api/v1/citas');
    const d=await r.json();
    allCitas=d.citas||[];
  }catch(e){console.error(e);}
}

async function init(){
  await Promise.all([loadPacientes(),loadCitas()]);
  render();
}

init();
</script>
</body>
</html>
